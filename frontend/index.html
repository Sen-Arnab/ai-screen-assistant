<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Screen Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Collapsed emoji button -->
  <div id="emoji-button" class="emoji-button">🤖</div>
  
  <!-- Expanded widget -->
  <div id="widget" class="widget hidden">
    <div class="drag-handle">
      <span class="title">🤖 Assistant</span>
      <div class="header-buttons">
        <button id="history-btn" class="icon-btn" title="History">📜</button>
        <button id="commands-btn" class="icon-btn" title="Saved Commands">⚡️</button>
        <button id="settings-btn" class="icon-btn" title="Settings">⚙️</button>
        <button id="close" class="icon-btn" title="Close">×</button>
      </div>
    </div>
    
    <!-- Main view -->
    <div id="main-view" class="content">
      <div id="quick-actions" class="quick-actions"></div>
      <div class="custom-input">
        <input type="text" id="question" placeholder="Ask anything..." />
        <button id="ask">Ask</button>
      </div>
      <div id="result" class="result"></div>
      <div class="result-actions hidden" id="result-actions">
        <button id="copy-result" class="secondary-btn" style="width: auto; padding: 6px 12px; font-size: 11px;">
          📋 Copy to Clipboard
        </button>
      </div>
    </div>
    
    <!-- Saved Commands view -->
    <div id="commands-view" class="content hidden">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h3 style="margin: 0;">Saved Commands</h3>
        <button id="toggle-edit-mode" class="secondary-btn" style="width: auto; padding: 6px 12px; font-size: 12px;">
          ✏️ Edit Mode
        </button>
      </div>
      <div id="saved-commands-list" class="saved-commands-list"></div>
      <div class="command-actions">
        <button id="add-category-btn" class="primary-btn" style="display: none;">+ Add Category</button>
        <button id="back-from-commands" class="secondary-btn">← Back</button>
      </div>
    </div>
    
    <!-- Add/Edit Category Modal -->
    <div id="category-modal" class="modal hidden">
      <div class="modal-content">
        <h3 id="category-modal-title">Add Category</h3>
        <div class="setting-group">
          <label>Category Name:</label>
          <input type="text" id="category-name-input" placeholder="e.g., AWS, Development" />
        </div>
        <div class="modal-buttons">
          <button id="save-category-btn" class="primary-btn">Save</button>
          <button id="cancel-category-btn" class="secondary-btn">Cancel</button>
        </div>
      </div>
    </div>
    
    <!-- Add/Edit Command Modal -->
    <div id="command-modal" class="modal hidden">
      <div class="modal-content">
        <h3 id="command-modal-title">Add Command</h3>
        <div class="setting-group">
          <label>Command Name:</label>
          <input type="text" id="command-name-input" placeholder="e.g., Start Server" />
        </div>
        <div class="setting-group">
          <label>Command:</label>
          <textarea id="command-text-input" placeholder="e.g., cd ~/project && npm start" rows="3"></textarea>
        </div>
        <div class="setting-group">
          <label>Emoji Icon:</label>
          <input type="text" id="command-icon-input" placeholder="e.g., 🚀" maxlength="2" />
        </div>
        <div class="modal-buttons">
          <button id="save-command-btn" class="primary-btn">Save</button>
          <button id="cancel-command-btn" class="secondary-btn">Cancel</button>
        </div>
      </div>
    </div>
    
    <!-- History view -->
    <div id="history-view" class="content hidden">
      <h3>Conversation History</h3>
      <div id="history-list" class="history-list"></div>
      <div class="command-actions">
        <button id="clear-history" class="secondary-btn">Clear History</button>
        <button id="back-from-history" class="secondary-btn">← Back</button>
      </div>
    </div>
    
    <!-- Settings view -->
    <div id="settings-view" class="content hidden">
      <h3>Settings</h3>
      <div class="setting-group">
        <label>Assistant Name:</label>
        <input type="text" id="assistant-name" />
      </div>
      <div class="setting-group">
        <label>Emoji:</label>
        <input type="text" id="assistant-emoji" maxlength="2" />
      </div>
      <div class="setting-group">
        <label>Temperature (0-1):</label>
        <input type="number" id="temperature" min="0" max="1" step="0.1" />
      </div>
      <div class="setting-group">
        <label>Max Tokens:</label>
        <input type="number" id="max-tokens" min="50" max="1000" step="50" />
      </div>
      <div class="setting-group">
        <label>
          <input type="checkbox" id="auto-expand" />
          Auto-expand on text capture
        </label>
      </div>
      <div class="setting-group">
        <label>
          <input type="checkbox" id="auto-detect-forms" />
          Auto-detect and fill forms
        </label>
      </div>
      <div class="setting-group">
        <label>Widget Opacity (0-1):</label>
        <input type="range" id="opacity" min="0.3" max="1" step="0.05" />
        <span id="opacity-value">0.95</span>
      </div>
      <div class="setting-group">
        <label>Default Language:</label>
        <select id="default-language">
          <option value="auto">Auto-detect</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
        </select>
      </div>
      <button id="save-settings" class="primary-btn">Save Settings</button>
      <button id="edit-actions" class="secondary-btn">Edit Actions (config.json)</button>
      <button id="back-from-settings" class="secondary-btn">← Back</button>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
