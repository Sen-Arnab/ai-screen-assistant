<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 0;
      cursor: crosshair;
      background: rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    #selection {
      position: absolute;
      border: 2px dashed #00ff00;
      background: rgba(0, 255, 0, 0.1);
      display: none;
    }
    #instructions {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: sans-serif;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="instructions">Click and drag to select region. Press ESC to cancel.</div>
  <div id="selection"></div>
  <script>
    const { ipcRenderer } = require('electron');
    
    let startX, startY, isSelecting = false;
    const selection = document.getElementById('selection');
    
    document.addEventListener('mousedown', (e) => {
      startX = e.clientX;
      startY = e.clientY;
      isSelecting = true;
      selection.style.left = startX + 'px';
      selection.style.top = startY + 'px';
      selection.style.width = '0px';
      selection.style.height = '0px';
      selection.style.display = 'block';
    });
    
    document.addEventListener('mousemove', (e) => {
      if (!isSelecting) return;
      
      const width = e.clientX - startX;
      const height = e.clientY - startY;
      
      selection.style.width = Math.abs(width) + 'px';
      selection.style.height = Math.abs(height) + 'px';
      selection.style.left = (width < 0 ? e.clientX : startX) + 'px';
      selection.style.top = (height < 0 ? e.clientY : startY) + 'px';
    });
    
    document.addEventListener('mouseup', (e) => {
      if (!isSelecting) return;
      
      const width = Math.abs(e.clientX - startX);
      const height = Math.abs(e.clientY - startY);
      const x = Math.min(startX, e.clientX);
      const y = Math.min(startY, e.clientY);
      
      if (width > 10 && height > 10) {
        ipcRenderer.send('region-selected', { x, y, width, height });
      } else {
        ipcRenderer.send('region-selected', null);
      }
    });
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        ipcRenderer.send('region-selected', null);
      }
    });
  </script>
</body>
</html>
